<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Times Tables</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- Apply saved theme immediately to avoid flash -->
  <script>
    (function() {
      var t = localStorage.getItem('tt_theme') || 'default';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div id="app">

  <!-- ===== WELCOME SCREEN ===== -->
  <div id="screen-welcome" class="screen">
    <div class="welcome-wrap">

      <div class="welcome-header">
        <div class="mascot" id="welcome-avatar">🧮</div>
        <h1>Times Tables!</h1>
      </div>

      <!-- Name -->
      <div class="section-card">
        <h2 class="section-title">Your name</h2>
        <input type="text" id="player-name-input" class="name-input" placeholder="Enter your name" maxlength="20" />
      </div>

      <!-- Avatar picker -->
      <div class="section-card">
        <h2 class="section-title">Your avatar</h2>
        <div class="avatar-grid" id="avatar-buttons"></div>
      </div>

      <!-- Theme picker -->
      <div class="section-card">
        <h2 class="section-title">Theme</h2>
        <div class="theme-grid" id="theme-buttons"></div>
      </div>

      <!-- Table picker -->
      <div class="section-card">
        <h2 class="section-title">Choose your tables</h2>
        <div class="table-grid" id="table-buttons"></div>
        <label class="mix-label">
          <input type="checkbox" id="mix-mode" />
          <span class="mix-toggle"></span>
          Mix all selected tables
        </label>
      </div>

      <button class="btn-primary" id="btn-start">Let's Play! 🚀</button>
    </div>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div id="screen-game" class="screen">
    <div class="game-wrap">

      <div class="game-hud">
        <div class="hud-pill">
          <span class="hud-icon">📝</span>
          <span id="hud-q">1 / 10</span>
        </div>
        <div class="hud-pill hud-score-pill">
          <span class="hud-icon">⭐</span>
          <span id="hud-score">0</span>
        </div>
        <div class="hud-pill">
          <span class="hud-icon">🔥</span>
          <span id="hud-streak">0</span>
        </div>
      </div>

      <div class="progress-track">
        <div class="progress-fill" id="progress-bar"></div>
      </div>

      <div class="question-card" id="question-card">
        <div class="game-avatar-wrap">
          <span class="game-avatar" id="game-avatar">🦁</span>
        </div>
        <div class="question-eq" id="question-text">4 × 7 = ?</div>
        <div class="feedback-msg" id="feedback"></div>
      </div>

      <div class="choices-grid" id="choices"></div>

    </div>
  </div>

  <!-- ===== RESULTS SCREEN ===== -->
  <div id="screen-results" class="screen">
    <div class="results-wrap">
      <div class="trophy-emoji" id="result-emoji">🏆</div>
      <div class="result-avatar-big" id="result-avatar">🦁</div>
      <h1 class="result-title" id="result-title">Amazing!</h1>
      <p class="result-sub" id="result-subtitle"></p>
      <div class="stars-row" id="result-stars"></div>
      <div class="stats-row">
        <div class="stat-box stat-correct">
          <span class="stat-num" id="res-correct">0</span>
          <span class="stat-label">Correct</span>
        </div>
        <div class="stat-box stat-wrong">
          <span class="stat-num" id="res-wrong">0</span>
          <span class="stat-label">Wrong</span>
        </div>
        <div class="stat-box stat-streak">
          <span class="stat-num" id="res-streak">0</span>
          <span class="stat-label">Best streak</span>
        </div>
      </div>
      <button class="btn-primary" id="btn-play-again">Play Again 🎮</button>
      <button class="btn-ghost" id="btn-change-table">Change tables</button>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
